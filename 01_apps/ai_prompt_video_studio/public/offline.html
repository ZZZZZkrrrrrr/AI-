<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#126a63" />
    <title>离线 - AI 视频工作台</title>
    <style>
      :root {
        font-family: "Microsoft YaHei", "PingFang SC", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #17202a;
        background: #eef1ef;
      }

      body {
        display: grid;
        min-height: 100dvh;
        margin: 0;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(440px, 100%);
        padding: 28px;
        border: 1px solid #d9dfdc;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 8px 28px rgba(29, 43, 37, 0.08);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 24px;
        line-height: 1.25;
      }

      p {
        margin: 0 0 18px;
        color: #68756f;
        font-size: 15px;
        line-height: 1.7;
      }

      button {
        min-height: 44px;
        padding: 0 16px;
        border: 0;
        border-radius: 8px;
        background: #126a63;
        color: #ffffff;
        font: inherit;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>当前网络不可用</h1>
      <p>已进入离线模式。你可以稍后刷新页面继续查看任务状态，创建和生成视频需要恢复网络后再操作。</p>
      <button type="button" onclick="window.location.reload()">重新连接</button>
    </main>
  </body>
</html>
